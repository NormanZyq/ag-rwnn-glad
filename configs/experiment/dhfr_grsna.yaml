# @package _global_

# to execute this experiment run:
# python train.py experiment=example

defaults:
  - override /data: grsne
  - override /model: grsnc2_anomaly
#  - override /callbacks: default
  - override /trainer: gpu
#  - override /experiment: sage


# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

trainer:
  max_epochs: 350

callbacks:
  early_stopping:
    patience: 30

tags: ['gcn', 'grsn-anomaly', 'dhfr']

data:
  name: 'DHFR'
  mode: 'combined'
  walk_length: [10]
  num_sample: 10
  batch_size: 32
  down_sample_rate: 0.2
  dsl: 0
  sampling_method: 'anomaly_aware'
  bias_strength: 2.0

model:
  optimizer:
    lr: 0.001
  attr_feat_size: 56
  structure_feat_size: 14*${data.num_sample}+${data.num_sample}*${data.walk_length}[0]
  structure_hidden_size: 32
  str_dropout: 0.3
  graph_conv:
    _target_: src.models.components.graph_conv.MyGraphConv
    hidden_size: 32
    output_size: 32
    dropout: 0.3
  graph_classifier:
    dropout: 0.5
